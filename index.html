<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>ViewGhost Document Server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="assets/vue.css">
  
  <link rel="stylesheet" href="assets/github.css">
  
  <style>
    /* 3. 关键：解决冲突 */
    /* 让 Typora 的样式只作用于内容区，不影响侧边栏 */
    .markdown-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 15px 40px 15px;
    }
    
    /* 如果 Typora 的表格没出来，强制补丁 */
    .markdown-section table {
      display: table !important;
      width: 100% !important;
      border-collapse: collapse !important;
      margin-bottom: 1rem !important;
    }
    .markdown-section table tr {
      border-top: 1px solid #dfe2e5 !important;
      background-color: #fff !important;
    }
    .markdown-section table th, .markdown-section table td {
      border: 1px solid #dfe2e5 !important;
      padding: 6px 13px !important;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div> 
  <script>
    window.$docsify = {
      name: 'ViewGhost',
      loadSidebar: true,
      auto2top: true,
      homepage: 'README.md',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/_sidebar.md': '/_sidebar.md'
      },
      // --- 核心修改 1: 确保文件服务器链接被视为外部链接 ---
      // Docsify 会检查链接，如果匹配这个正则，它就不会拦截处理
      externalLinkTarget: '_self', // 在当前窗口打开
      
      // --- 核心修改 2: 路由黑名单 ---
      // 告诉 Docsify 忽略 /fileserver 开头的路径
      noCompileLinks: [
        '/fileserver/.*'
      ],

      // 额外的保险：如果通过侧边栏点击，强制跳转
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            // 每次页面渲染完，检查侧边栏里的文件服务器链接
            var fsLink = document.querySelector('a[href="/fileserver/"]');
            if (fsLink) {
              // 给它加上 data-nosearch 属性，防止 docsify 拦截
              fsLink.setAttribute('target', '_self');
              fsLink.onclick = function() {
                window.location.href = '/fileserver/';
              };
            }
          });
        }
      ]
    };
  </script>
  
  <script src="assets/docsify.min.js"></script>
  <script src="assets/search.min.js"></script>
</body>
</html>
