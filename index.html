<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>ViewGhost Document Server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="assets/vue.css">
  
  <link rel="stylesheet" href="assets/github.css">
  
  <style>
    /* 3. 关键：解决冲突 */
    /* 让 Typora 的样式只作用于内容区，不影响侧边栏 */
    .markdown-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 15px 40px 15px;
    }
    
    /* 如果 Typora 的表格没出来，强制补丁 */
    .markdown-section table {
      display: table !important;
      width: 100% !important;
      border-collapse: collapse !important;
      margin-bottom: 1rem !important;
    }
    .markdown-section table tr {
      border-top: 1px solid #dfe2e5 !important;
      background-color: #fff !important;
    }
    .markdown-section table th, .markdown-section table td {
      border: 1px solid #dfe2e5 !important;
      padding: 6px 13px !important;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div> 
<script>
window.$docsify = {
  name: 'ViewGhost',
  loadSidebar: true,
  auto2top: true,
  homepage: 'README.md',
  alias: {
    '/.*/_sidebar.md': '/_sidebar.md',
    '/_sidebar.md': '/_sidebar.md',
    // --- 关键修改：重定向虚拟路径 ---
    // 当 Docsify 尝试加载 fileserver-view 时，让它实际去读 README.md (确保不报 404)
    '/fileserver-view': '/README.md' 
  },
  noCompileLinks: ['/fileserver/.*'],
  plugins: [
    function(hook, vm) {
      // 在渲染之前，判断当前路由是否为我们的虚拟文件服务器路径
      hook.beforeEach(function(content) {
        // 注意：这里检查的是 vm.route.path
        if (vm.route.path === '/fileserver-view') {
          // 覆盖 README.md 的内容，显示为 iframe
          return `<iframe src="/fileserver/" style="width:100%; height:calc(100vh - 140px); border:none; background:white;"></iframe>`;
        }
        return content;
      });

      hook.doneEach(function() {
        if (vm.route.path === '/fileserver-view') {
          document.title = "文件共享 | ViewGhost";
        }
      });
    }
  ]
};
</script>
  
  <script src="assets/docsify.min.js"></script>
  <script src="assets/search.min.js"></script>
</body>
</html>
