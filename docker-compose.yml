version: '3.8'

services:
  viewghost:
    # 使用阿里云私有仓库地址
    image: crpi-lq7d4rau6bjttgo1.cn-shanghai.personal.cr.aliyuncs.com/sinojelly/viewghost:v1.0
    container_name: viewghost-app
    restart: always
    ports:
      - "8080:8080"
    volumes:
      # 挂载文档目录：将宿主机存放 Markdown 的目录挂载到容器的 /app
      # 请将左侧的 /your/local/markdown/path 替换为实际路径
      - "/your/local/markdown/path:/app"
      
      # 挂载文件共享目录：将宿主机需要共享的目录挂载到 /app/shared-files
      # 请将左侧的 /your/local/shared/files 替换为实际路径
      - "/your/local/shared/files:/app/shared-files"
      
      # 挂载配置文件（可选）：如果你想在宿主机修改配置，取消下面一行的注释
      # - "./viewghost.config:/app/viewghost.config"
    
    environment:
      # 如果你的程序支持通过环境变量传参，可以在这里添加
      - TZ=Asia/Shanghai